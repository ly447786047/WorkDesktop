<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>西部工作台</title>
    <link rel="icon" href="images/xibuLogo.png" type="image/png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
        }

        :root {
            --bg-img: url('images/bg.jpg');
            --bg-refresh: 0;
        }

        body {
            padding: 20px;
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            transition: background-image 1s ease-in-out;
            background-image: var(--bg-img);
            will-change: background-image;
            transform: translateZ(calc(var(--bg-refresh) * 1px));
        }

        .workbench {
            width: calc(100vw - 40px);
            height: calc(100vh - 70px);
            border-radius: 20px;
            background: #00000000;
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 10;
        }

        .weather-alert {
            position: absolute;
            top: 140px;
            right: 40px;
            width: 420px;
            padding: 18px 22px;
            border-radius: 14px;
            backdrop-filter: blur(5px);
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.35);
            color: #fff;
            z-index: 9999;
            display: none;
        }

        .alert-red {
            background: rgba(220, 30, 30, 0.7);
            border: 1px solid rgba(255, 100, 100, 0.4);
        }

        .alert-orange {
            background: rgba(240, 110, 0, 0.7);
            border: 1px solid rgba(255, 160, 80, 0.4);
        }

        .alert-yellow {
            background: rgba(220, 180, 0, 0.7);
            border: 1px solid rgba(255, 220, 80, 0.4);
        }

        .alert-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .alert-title {
            font-size: 18px;
            font-weight: bold;
        }

        .alert-close {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 1px solid #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
        }

        .alert-content {
            font-size: 14px;
            line-height: 1.6;
        }

        .header {
            width: 100%;
            height: 100px;
            background-image: linear-gradient(to right, #f7ff0055, #db36a455);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 20px;
            border-radius: 20px 20px 0 0;
            border-bottom: 1px solid #ffffff88;
            box-shadow: 0 5px 5px #ffffff88;
            position: relative;
            z-index: 100;
            overflow: visible;
        }

        .header img.logo {
            width: 80px;
            height: 80px;
            object-fit: contain;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.3));
        }

        .slogan {
            flex: 1;
            margin-left: 20px;
            font-size: 32px;
            color: #ed2c25;
            font-weight: bold;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            letter-spacing: 1.2px;
        }

        .logo:hover {
            cursor: pointer;
            user-select: none;
            transform: scale(1.1);
            transition: transform 0.3s ease-in-out;
        }

        .slogan:hover {
            cursor: pointer;
            user-select: none;
            transform: scale(1.02);
            transition: transform 0.3s ease-in-out;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #fff;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: visible;
        }

        .weather-img {
            width: 50px;
            height: 50px;
            filter: drop-shadow(0 0 10px #ffffff88);
            cursor: pointer;
        }

        .weather-info-wrap {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
        }

        #dateTime {
            font-size: 24px;
            letter-spacing: 1px;
            color: #ffffff;
            text-align: center;
            font-weight: bold;
        }

        #weather {
            font-size: 13px;
        }

        .forecast-pop {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 8px;
            padding: 16px;
            background-image: linear-gradient(to right, #00c9ff, #92fe9d);
            backdrop-filter: blur(10px);
            border: 1px solid #ffffff88;
            border-radius: 15px;
            z-index: 9998;
            display: none;
            white-space: nowrap;
        }

        .header-right:hover .forecast-pop {
            display: block;
            margin-top: 40px;
        }

        .forecast-box {
            display: flex;
            gap: 5.5px;
            font-size: 12px;
        }

        .day-item {
            min-width: 70px;
            text-align: center;
            padding: 4px;
            background: #ffffff66;
            border-radius: 10px;
        }

        .day-img {
            width: 25px;
            height: 25px;
            margin: 0 auto 5px;
            filter: drop-shadow(0 0 4px rgba(255, 255, 255, 0.3));
        }

        .content {
            flex: 1;
            display: grid;
            padding: 20px;
            grid-template-columns: 20% 39% 41%;
            grid-template-rows: 16% 34% 50%;
            gap: 20px;
            z-index: 1;
            position: relative;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border-radius: 15px;
            border: 1px solid #ffffff88;
            color: #fff;
            padding: 10px;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 2px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 1;
        }

        .card-title {
            font-size: 20px;
            padding-bottom: 10px;
            margin-bottom: 5px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.5);
        }

        .card-desc {
            font-size: 13px;
            opacity: 0.85;
        }

        .card-software {
            background-image: linear-gradient(#f7797d66, #fbd78666, #c6ffdd66);
            backdrop-filter: blur(5px);
            grid-column: 1 / 2;
            grid-row: 1 / 4;
            height: calc(100% - 40px);
        }

        .card-workall {
            background-image: linear-gradient(#fc00ff66, #00dbde66);
            backdrop-filter: blur(5px);
            grid-column: 2 / 3;
            grid-row: 1 / 3;
        }

        .card-working {
            background-image: linear-gradient(#fc00ff66, #00dbde66);
            backdrop-filter: blur(5px);
            grid-column: 2 / 3;
            grid-row: 3 / 4;
            height: calc(100% - 40px);
        }

        .card-hitokoto {
            background-image: linear-gradient(to right, #00c9ff66, #92fe9d66);
            backdrop-filter: blur(5px);
            grid-column: 3 / 4;
            grid-row: 1 / 2;
            width: calc(100% - 40px);
        }

        .hitokoto-title {
            position: relative;
            width: 100%;
            height: 25px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 5px;
        }

        #timeTipText {
            position: absolute;
            width: 100%;
            height: 100%;
            line-height: 25px;
            font-size: 14px;
            text-align: center;
            color: #ffffff;
            font-weight: 300;
            padding-right: 8px;
            z-index: 2;
        }

        #timeProgressBar {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0%;
            background-image: linear-gradient(to right, #1fddff, #ff4b1f);
            transition: width 0.5s ease;
            z-index: 1;
        }

        .hitokoto-text {
            width: 100%;
            text-align: center;
            align-items: center;
            justify-content: center;
            color: #eee;
            font-size: 18px;
            font-weight: 300;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
        }

        .card-diary {
            background-image: linear-gradient(#00c3ff66, #ffff1c66);
            backdrop-filter: blur(5px);
            grid-column: 3 / 4;
            grid-row: 2 / 3;
            width: calc(100% - 40px);
        }

        .card-todo {
            background-image: linear-gradient(#fc00ff66, #00dbde66);
            backdrop-filter: blur(5px);
            grid-column: 3 / 4;
            grid-row: 3 / 4;
            width: calc(100% - 40px);
            height: calc(100% - 40px);
        }
    </style>
</head>

<body>
    <div class="workbench" id="mainWrap">
        <div class="weather-alert" id="alertBox">
            <div class="alert-header">
                <div class="alert-title">气象预警通知</div>
                <div class="alert-close" id="closeAlert">×</div>
            </div>
            <div class="alert-content" id="alertText"></div>
        </div>

        <div class="header">
            <img class="logo" src="images/youthLogo.png" alt="团徽"
                onclick="window.open('https://zhtj.youth.cn/zhtj/','_blank')">
            <img class="logo" src="images/xibuLogo.png" alt="志愿者"
                onclick="window.open('https://west.youth.cn/home','_blank')">
            <span class="slogan"
                onclick="window.open('https://xibu.youth.cn/','_blank')">到西部去，到基层去<br>到祖国和人民最需要的地方去！</span>

            <div class="header-right">
                <img id="weatherIcon" class="weather-img" src="images/weather/default.png" alt="天气图标">
                <div class="weather-info-wrap">
                    <span id="dateTime"></span>
                    <span id="weather">正在加载天气...</span>
                </div>
                <div class="forecast-pop" id="forecastPop">
                    <div class="forecast-box" id="forecastWrap"></div>
                </div>
            </div>
        </div>

        <div class="content">
            <div class="card card-software">
                <div class="card-title">💻 常用软件</div>
                <div class="card-desc">微信、WPS、浏览器、各类办公快捷方式</div>
            </div>
            <div class="card card-workall">
                <div class="card-title">📂 工作总文件夹</div>
                <div class="card-desc">全部驻村、走访、政策、会议归档总目录</div>
            </div>
            <div class="card card-working">
                <div class="card-title">🔧 正在进行的工作</div>
                <div class="card-desc">当下推进的入户走访、材料申报、志愿活动项目</div>
            </div>
            <div class="card card-hitokoto">
                <div class="hitokoto-title">
                    <div id="timeTipText"></div>
                    <div id="timeProgressBar"></div>
                </div>
                <div class="hitokoto-text" id="hitokoto">正在加载今日一言...<br>Loading...</div>
            </div>
            <div class="card card-diary">
                <div class="card-title">📝 西部计划日记 & 工作总结</div>
                <div class="card-desc">下乡随笔、月度思想汇报、基层感悟归档</div>
            </div>
            <div class="card card-todo">
                <div class="card-title">✅ 今日待办工作</div>
                <div class="card-desc">每日任务清单、会议安排、材料整理计划</div>
            </div>
        </div>
    </div>

    <script>
        const timeDom = document.getElementById('dateTime');
        const weatherDom = document.getElementById('weather');
        const weatherIcon = document.getElementById('weatherIcon');
        const forecastWrap = document.getElementById('forecastWrap');
        const alertBox = document.getElementById('alertBox');
        const alertText = document.getElementById('alertText');
        const closeAlert = document.getElementById('closeAlert');
        const hitokotoDom = document.getElementById('hitokoto');

        closeAlert.onclick = () => alertBox.style.display = 'none';

        function getFormatTime() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            return `${year}年${month}月${day}日 ${h}:${m}:${s}`;
        }
        timeDom.textContent = getFormatTime();
        setInterval(() => timeDom.textContent = getFormatTime(), 1000);

        function handleWeatherIconError(img) {
            img.src = "images/weather/default.png";
        }
        weatherIcon.onerror = () => handleWeatherIconError(weatherIcon);

        const APPID = "69475998";
        const APPSECRET = "rldbX1Zl";
        const CITY_NAME = "泽普";
        const WEATHER_API_URL = `https://gfeljm.tianqiapi.com/free/v2031?appid=${APPID}&appsecret=${APPSECRET}&hours=1&city=${CITY_NAME}`;

        function renderAlert(alarmList) {
            if (!alarmList || alarmList.length === 0) {
                alertBox.style.display = 'none';
                return;
            }
            const localAlarm = alarmList.find(item => item.alarm_title.includes(CITY_NAME)) || alarmList[0];
            let levelClass = "alert-yellow";
            if (localAlarm.alarm_level === "红色") levelClass = "alert-red";
            if (localAlarm.alarm_level === "橙色") levelClass = "alert-orange";

            alertBox.className = `weather-alert ${levelClass}`;
            alertText.innerHTML = `<strong>${localAlarm.alarm_title}</strong><br>${localAlarm.alarm_content}`;
            alertBox.style.display = 'block';
        }

        function renderForecast(weekList) {
            let html = "";
            weekList.forEach(day => {
                const imgSrc = `images/weather/${day.wea_img}.png`;
                html += `
                    <div class="day-item">
                        <img class="day-img" src="${imgSrc}" onerror="this.src='images/weather/default.png'">
                        <div class="day-week">${Number(day.date.split('-')[1])}月${Number(day.date.split('-')[2])}日</div>
                        <div>${day.wea}</div>
                        <div class="day-temp">${day.tem2}~${day.tem1}℃</div>
                    </div>
                `;
            });
            forecastWrap.innerHTML = html;
        }

        async function fetchZepuWeather() {
            try {
                const res = await fetch(WEATHER_API_URL);
                const data = await res.json();
                const dayData = data.day;

                const weaText = dayData.wea;
                const tempNow = dayData.tem;
                const tempMin = dayData.tem2;
                const tempMax = dayData.tem1;
                const humidity = dayData.humidity;
                const uv = dayData.uvDescription;
                weatherDom.textContent = `${CITY_NAME}｜${weaText} ${tempMin}~${tempMax}℃ 实时${tempNow}℃ 湿度${humidity} 紫外线${uv}`;

                const imgName = dayData.wea_img || "default";
                weatherIcon.src = `images/weather/${imgName}.png`;

                renderAlert(data.alarm);
                renderForecast(data.week);

            } catch (err) {
                weatherDom.textContent = "天气加载失败！";
                console.error("天气接口请求异常：", err);
            }
        }

        function getHitokoto() {
            fetch('https://luckycola.com.cn/tools/yiyan', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    ColaKey: "5zmixwAgsJxYeg1784357011649l1sVn6UroB"
                })
            })
                .then(res => res.json())
                .then(resData => {
                    if (resData.code === 0) {
                        const info = resData.data;
                        hitokotoDom.innerHTML = `<div class="hitokoto-text">${info.note}</div><div class="hitokoto-text">${info.content}</div>`;
                    } else {
                        hitokotoDom.innerHTML = `<div class="hitokoto-text">奔赴西部，不负韶华。</div><div class="hitokoto-text">Head westward, and make the most of your youth.</div>`;
                    }
                })
                .catch(error => {
                    hitokotoDom.innerHTML = `<div class="hitokoto-text">奔赴西部，不负韶华。</div><div class="hitokoto-text">Head westward, and make the most of your youth.</div>`;
                    console.error("每日一言接口异常：", error);
                });
        }

        let refreshCount = 0;
        function autoChangeBg() {
            const totalImg = 159;
            const randomNum = Math.floor(Math.random() * totalImg) + 1;
            const localImg = `images/background/bg_${randomNum}.jpg`;
            document.documentElement.style.setProperty('--bg-img', `url(${localImg})`);
            refreshCount += 1;
            document.documentElement.style.setProperty('--bg-refresh', refreshCount);

            const testImg = new Image();
            testImg.src = localImg;
            testImg.onerror = () => {
                document.documentElement.style.setProperty('--bg-img', "url('images/bg.jpg')");
            };
        }
        const timeTipText = document.getElementById('timeTipText');
        const timeProgressBar = document.getElementById('timeProgressBar');

        function getWorkTimeConfig(month) {
            // 5-9月夏令时，10-4月冬令时
            if (month >= 5 && month <= 9) {
                return {
                    morningStart: 10 * 60,    // 10:00 上班
                    noonStart: 14 * 60,       // 14:00 午休
                    afternoonStart: 16 * 60,  // 16:00 下午上班
                    workEnd: 20 * 60          // 20:00 下班
                }
            } else {
                return {
                    morningStart: 10 * 60,
                    noonStart: 14 * 60,
                    afternoonStart: 15 * 60 + 30,
                    workEnd: 19 * 60 + 30
                }
            }
        }

        function formatMinute(totalMin) {
            const h = Math.floor(totalMin / 60);
            const m = totalMin % 60;
            return `${h}小时${m}分钟`;
        }

        function updateCountDown() {
            const now = new Date();
            const week = now.getDay(); // 0周日 1周一...6周六
            const month = now.getMonth() + 1;
            const h = now.getHours();
            const m = now.getMinutes();
            const nowTotalMin = h * 60 + m;
            const cfg = getWorkTimeConfig(month);

            if (week === 0 || week === 6) {
                timeTipText.textContent = "今天是周末，好好休息吧！";
                timeProgressBar.style.width = "0%";
                return;
            }

            const morningWorkMin = cfg.noonStart - cfg.morningStart;
            const afternoonWorkMin = cfg.workEnd - cfg.afternoonStart;
            const allWorkTotal = morningWorkMin + afternoonWorkMin;

            let tip = "";
            let workedMin = 0;

            if (nowTotalMin < cfg.morningStart - 60) {
                tip = "现在是休息时间，养足精神等待上班";
                workedMin = 0;
            }
            else if (nowTotalMin >= cfg.morningStart - 60 && nowTotalMin < cfg.morningStart) {
                const leftMin = cfg.morningStart - nowTotalMin;
                tip = `马上上班啦，加油哦！距离上班还有${formatMinute(leftMin)}`;
                workedMin = 0;
            }
            else if (nowTotalMin >= cfg.morningStart && nowTotalMin < cfg.noonStart) {
                workedMin = nowTotalMin - cfg.morningStart;
                const leftMin = cfg.noonStart - nowTotalMin;
                tip = `上午在岗，距离午休还有${formatMinute(leftMin)}`;
            }
            else if (nowTotalMin >= cfg.noonStart && nowTotalMin < cfg.afternoonStart) {
                workedMin = morningWorkMin;
                tip = "中午啦，记得好好吃饭！";
            }
            else if (nowTotalMin >= cfg.afternoonStart && nowTotalMin < cfg.workEnd - 60) {
                workedMin = morningWorkMin + (nowTotalMin - cfg.afternoonStart);
                const leftMin = cfg.workEnd - nowTotalMin;
                tip = `在岗中，离下班还有${formatMinute(leftMin)}`;
            }
            else if (nowTotalMin >= cfg.workEnd - 60 && nowTotalMin < cfg.workEnd) {
                workedMin = morningWorkMin + (nowTotalMin - cfg.afternoonStart);
                const leftMin = cfg.workEnd - nowTotalMin;
                tip = `再坚持一下，马上下班啦！距离下班还有${formatMinute(leftMin)}`;
            }
            else {
                tip = "下班啦，今天辛苦啦！";
                workedMin = allWorkTotal;
            }

            const progress = (workedMin / allWorkTotal) * 100;
            timeTipText.textContent = tip;
            timeProgressBar.style.width = progress + "%";
        }

        updateCountDown();
        setInterval(updateCountDown, 1000);

        autoChangeBg();
        setInterval(autoChangeBg, 600000);

        fetchZepuWeather();
        getHitokoto();

        setInterval(fetchZepuWeather, 60000);
        setInterval(getHitokoto, 60000);
    </script>
</body>

</html>
